name: Windows-Build-Check
on: 
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *' # Chạy dự phòng mỗi 3 tiếng

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 210 # Đặt 3.5 tiếng để chủ động rerun trước khi GitHub ngắt

    steps:
      - name: 1. Preparing Environment
        shell: powershell
        run: |
          Write-Host "Installing Required Tools..."
          choco install tailscale -y --no-progress
          # Chạy service, nếu đã chạy thì bỏ qua lỗi
          Start-Service tailscale -ErrorAction SilentlyContinue

      - name: 2. Network Integration
        shell: powershell
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          $TS_EXE = "C:\Program Files\Tailscale\tailscale.exe"
          Write-Host "Connecting to Tailscale Network..."
          & $TS_EXE up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=GitHub-VM --accept-routes --reset

      - name: 3. System Configuration
        shell: powershell
        run: |
          Write-Host "Configuring Remote Desktop..."
          $User = "runneradmin"
          $Pass = "Phuc1993"
          net user $User $Pass
          
          # Mở RDP và cấu hình Firewall
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: 4. Auto Trigger Next Session
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          $waitMinutes = 180 # 3 tiếng
          Write-Host "Session will auto-renew in $waitMinutes minutes..."
          
          # Vòng lặp chờ 3 tiếng, in log mỗi phút để không bị timeout
          for ($i=1; $i -le $waitMinutes; $i++) {
              Start-Sleep -Seconds 60
              if ($i % 10 -eq 0) { Write-Host "Uptime: $i minutes. Status: Active" }
          }

          # Lệnh tự động chạy lại workflow mới
          Write-Host "Triggering new session..."
          gh workflow run "Windows-Build-Check" --repo ${{ github.repository }}

      - name: 5. Finalizing
        shell: powershell
        run: |
          Write-Host "Waiting for hand-over..."
          Start-Sleep -Seconds 600 # Chờ thêm 10 phút trước khi tắt hẳn máy cũ
